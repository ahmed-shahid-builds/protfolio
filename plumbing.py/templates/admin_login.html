<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Jake's Plumbing</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Oswald', sans-serif;
            background: #0f1115;
            color: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1a1d24;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .login-box h1 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f1115;
            color: #fff;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #b5651d;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .login-box button:hover {
            background: #9c5419;
        }
        .flash-message {
            background: #4a1f1f;
            color: #ffb3b3;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Jake's Plumbing — Admin</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <input type="password" name="password" placeholder="Admin password" required autofocus>
            <button type="submit">Log In</button>
        </form>
    </div>

</body>
</html>
